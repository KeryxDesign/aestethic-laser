name: Deploy su Hostinger
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout codice
      uses: actions/checkout@v4

    - name: Installa Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Installazione dipendenze e Build
      run: |
        npm install
        npm run build

    - name: Inietta chiave Kit lato server (mai nel repo)
      run: printf "<?php return '%s';" "${{ secrets.GENTLEBEAM_KIT_KEY }}" > dist/kit_key.php

    - name: Carica il sito su Hostinger via FTP
      timeout-minutes: 12
      run: |
        sudo apt-get install -y lftp
        upload() {
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-protect-data yes;
            set ftp:passive-mode on;
            set ftp:prefer-epsv no;
            set net:timeout 15;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set net:persist-retries 3;
            mirror --reverse --verbose --no-perms --parallel=1 --exclude DO_NOT_UPLOAD_HERE ./dist/ ${{ secrets.FTP_REMOTE_DIR }};
            quit
          "
        }
        attempt=1
        max=3
        until upload; do
          if [ "$attempt" -ge "$max" ]; then
            echo "::error::Upload FTP fallito dopo $max tentativi."
            exit 1
          fi
          echo "::warning::Upload FTP fallito (tentativo $attempt/$max). Ritento tra 30s..."
          attempt=$((attempt+1))
          sleep 30
        done
        echo "Upload FTP riuscito (tentativo $attempt/$max)."
