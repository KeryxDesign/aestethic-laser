name: Deploy su Hostinger
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Un solo deploy alla volta: i push nuovi annullano quelli in corso (evita
# conflitti FTP "max-retries exceeded" da upload paralleli su Hostinger).
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout codice
      uses: actions/checkout@v4

    - name: Installa Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Installazione dipendenze e Build
      run: |
        npm install
        npm run build

    - name: Inietta chiave Kit lato server (mai nel repo)
      run: printf "<?php return '%s';" "${{ secrets.GENTLEBEAM_KIT_KEY }}" > dist/kit_key.php

    - name: Carica il sito su Hostinger via FTP
      timeout-minutes: 20
      run: |
        sudo apt-get install -y lftp
        upload() {
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-protect-data yes;
            set ftp:passive-mode on;
            set ftp:prefer-epsv no;
            set net:timeout 40;
            set net:max-retries 6;
            set net:reconnect-interval-base 10;
            set net:reconnect-interval-multiplier 1;
            set net:persist-retries 6;
            set net:connection-limit 1;
            set mirror:parallel-transfer-count 1;
            mirror --reverse --verbose --no-perms --parallel=1 --exclude DO_NOT_UPLOAD_HERE ./dist/ ${{ secrets.FTP_REMOTE_DIR }};
            quit
          "
        }
        attempt=1
        max=3
        until upload; do
          if [ "$attempt" -ge "$max" ]; then
            echo "::error::Upload FTP fallito dopo $max tentativi."
            exit 1
          fi
          echo "::warning::Upload FTP fallito (tentativo $attempt/$max). Ritento tra 30s..."
          attempt=$((attempt+1))
          sleep 30
        done
        echo "Upload FTP riuscito (tentativo $attempt/$max)."

    - name: Home del dominio alla root (dist/home -> index.html)
      run: |
        # La home e' buildata da Astro in dist/home/index.html con asset
        # assoluti sotto /gentletest/: alla root funziona senza altri file.
        cp dist/home/index.html root_index.html
        lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" -e "
          set ssl:verify-certificate no;
          set ftp:ssl-allow yes;
          set ftp:ssl-protect-data yes;
          set ftp:passive-mode on;
          set ftp:prefer-epsv no;
          set net:timeout 40;
          set net:max-retries 6;
          set net:reconnect-interval-base 10;
          set net:connection-limit 1;
          put root_index.html -o index.html;
          quit
        "
